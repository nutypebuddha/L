# Laverna — CI Quality Gate
# Runs on every push/PR: fmt, clippy, deny, test

name: CI

on:
  push:
    branches: ['**']
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: Check (fmt, clippy, deny, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt, clippy

      - name: Cache cargo-deny DB
        uses: actions/cache@v4
        continue-on-error: true
        with:
          path: ~/.cargo/advisory-dbs
          key: cargo-deny-${{ hashFiles('deny.toml') }}

      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Check clippy (default features)
        run: cargo clippy -- -D warnings

      - name: Check clippy (with llm)
        run: cargo clippy --features llm -- -D warnings

      - name: Check licenses, bans, advisories
        run: cargo deny check

      - name: Run tests
        run: cargo test

      - name: Swiss-Ephemeris oracle gate
        # Part 3 #1: fail the build if any graha (or the lagna degree) drifts
        # past 0.05° from the Swiss-verified ground truth. Pinned values live
        # in tests/swiss_oracle.rs; this is the standing guarantee the audit
        # called for (no Swiss dependency ships — values were verified by hand).
        run: cargo test --test swiss_oracle

      - name: CLI/MCP parity gate
        # Part 3 #2: the same validate/chart input must produce byte-identical
        # output through the CLI and the MCP tools/call path. The binary is
        # built WITH the mcp feature for this step (mcp_parity.rs is gated on
        # it), so it is not silently skipped under the default cargo test above.
        run: cargo test --features mcp --test mcp_parity

      - name: Run tests (with mcp)
        run: cargo test --features mcp

      - name: Run tests (with llm)
        run: cargo test --features llm --lib

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - name: Audit dependencies
        run: cargo audit

  cross-check:
    name: Cross-Compile Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64-unknown-linux-musl, aarch64-unknown-linux-musl]
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}
      - uses: taiki-e/setup-cross-toolchain-action@v1
        with:
          target: ${{ matrix.target }}
      - uses: actions/cache@v4
        with:
          path: |
            target/${{ matrix.target }}/release/.fingerprint
            target/${{ matrix.target }}/release/build
            target/${{ matrix.target }}/release/deps
          key: cross-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
      - name: "Build (slim: no default features)"
        run: cargo build --release --target ${{ matrix.target }} --no-default-features
      - name: Verify static link
        run: |
          bin=target/${{ matrix.target }}/release/laverna
          file "$bin"
          if readelf -d "$bin" | grep -q NEEDED; then
            echo "::error::$bin is dynamically linked"; exit 1
          fi

  embedded-corpus:
    name: Embedded Corpus Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Build (no default features)
        run: cargo build --release --no-default-features
      - name: Verify corpus loads from a foreign CWD
        run: |
          bin=target/release/laverna
          "$bin" ping
          "$bin" info
          ( cd /tmp && "$bin" entities | grep -q "214" ) || { echo "::error::seed corpus not embedded"; exit 1; }

  wasm-build:
    name: WASM build (laverna-wasm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: wasm32-unknown-unknown
      - name: Install wasm-bindgen-cli
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-bindgen-cli
      - name: Build WASM (cdylib)
        run: cargo build --release --target wasm32-unknown-unknown -p laverna-wasm
      - name: Generate bindings
        run: |
          wasm-bindgen \
            target/wasm32-unknown-unknown/release/laverna_wasm.wasm \
            --out-dir laverna-wasm/www --target web
      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: laverna-wasm
          path: laverna-wasm/www
          if-no-files-found: error

  release-assets:
    name: Release assets (static x86_64 + llama bundle)
    needs: [check, cross-check, embedded-corpus, wasm-build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: x86_64-unknown-linux-musl
      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: Build static x86_64-musl release
        run: |
          cargo build --release --target x86_64-unknown-linux-musl \
            --features "mcp websearch budget llm milp graph"
      - name: Verify static linkage
        run: |
          bin=target/x86_64-unknown-linux-musl/release/laverna
          file "$bin"
          if readelf -d "$bin" | grep -q NEEDED; then
            echo "::error::$bin is dynamically linked"; exit 1
          fi
      - name: Bundle llama engine
        run: |
          mkdir -p dist/bin/llama dist/bin/models
          cp target/x86_64-unknown-linux-musl/release/laverna dist/bin/laverna-x86_64
          cp -rL bin/llama/. dist/bin/llama/
          [ -f bin/models/.gitkeep ] && cp bin/models/.gitkeep dist/bin/models/
          tar -C dist -czf laverna-x86_64-bundle.tar.gz bin
      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/bin/laverna-x86_64
            laverna-x86_64-bundle.tar.gz

